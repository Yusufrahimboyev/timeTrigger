name: time_trigger
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  dio: ^5.9.2
  connectivity_plus: ^7.0.0
  intl_utils: ^2.8.7
  shimmer: ^3.0.0
  shared_preferences: ^2.5.4
  cached_network_image: ^3.4.1
  go_router: ^17.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  provider: ^6.1.5+1
  equatable: ^2.0.8
  chuck_interceptor: ^2.4.1
  flutter_local_notifications: ^21.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_localization: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/lotties/

# 1. Lokalizatsiya sozlamalari
flutter_intl:
  enabled: true
  main_locale: en
  arb_dir: lib/src/common/l10n
  output_dir: lib/src/common/l10n/generated

# 2. Launcher Icons sozlamalari
flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/images/logo.png"
  image_path_ios: "assets/images/logo.png"
  adaptive_icon_background: "#242A32"

  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#242A32"

# 3. Native Splash sozlamalari
flutter_native_splash:
  color: "#242A32"
  image: "assets/images/logo.png" # Splash ekranidagi rasm

  android_12:
    image: "assets/images/logo.png"
    color: "#242A32"